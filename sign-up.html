<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
</head>
<body>
  <div class="body-container">
    <div class="image-side">
      <img src="oregon.jpg" alt="K2 Mountain">
      <div class="logo-container">
        <img src="surfboard.png" alt="Surfboard Icon">
        <p class="logo-text">Waverr</p>
      </div>
    </div>
    <div class="form-side">
      <div class="form-info">
        <p>This is not a real online service! You know you need something like this in
           your life to help you realize your deepest dreams.<br>Sign up <em>now</em> to get started.
           <br><br>You <em>know</em> you want to.
        </p>
      </div>
      <div class="form-container">
        <form action="example.com/path" method="post">
          <div class="form-block">
            <legend>Let's do this!</legend>
            <div class="form-row">
              <div class="form-input">
                <label for="first-name">FIRST NAME</label>
                <input type="text" name="first-name" id="first-name" required>
              </div>
              <div class="form-input">
                <label for="last-name">LAST NAME</label>
                <input type="text" name="last-name" id="last-name" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-input">
                <label for="email">EMAIL</label>
                <input type="email" name="email" id="email" required>
              </div>
              <div class="form-input">
                <label for="phone-number">PHONE NUMBER</label>
                <input type="tel" name="phone-number" id="phone-number">
              </div>
            </div>
            <div class="form-row">
              <div class="form-input">
                <label for="password">PASSWORD</label>
                <input type="password" name="password" id="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required>
              </div>
              <div class="form-input">
                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input type="password" name="confirm-password" id="confirm-password" required>
              </div>
            </div>
          </div>
          <div class="submit-block">
            <button type="submit">Create Account</button>
          </div>
        </form>
      </div>
      <div class="form-info">
        <p>Already have an account? <a href="http://example.com">Log in</a></p>
      </div>
    </div>
  </div>
</body>
</html>
