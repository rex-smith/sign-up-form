<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
</head>
<body>
  <div class="body-container">
    <div class="image-side">
      <img src="oregon.jpg" alt="K2 Mountain">
      <div class="logo-container">
        <img src="surfboard.png" alt="Surfboard Icon">
        <p class="logo-text">Waverr</p>
      </div>
    </div>
    <div class="form-side">
      <p>This is not a real online service! You know you need something like this in
         your life to help you relaize your deepest dreams.<br>Sign up <em>now</em> to get started.
         <br><br>You <em>know</em> you want to.
      </p>
      <div class="form-container">
        <h1>Let's do this!</h1>
        <form action="example.com/path" method="post">
          <label for="first-name">FIRST NAME</label>
          <input type="text" name="first-name" id="first-name">
          <label for="last-name">LAST NAME</label>
          <input type="text" name="last-name" id="last-name">
          <label for="email">EMAIL</label>
          <input type="email" name="email" id="email">
          <label for="phone-number">PHONE NUMBER</label>
          <input type="tel" name="phone-number" id="phone-number">
          <label for="password">PASSWORD</label>
          <input type="password" name="password" id="password">
          <label for="confirm-password">CONFIRM PASSWORD</label>
          <input type="password" name="confirm-password" id="confirm-password">
          <button type="submit"></button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
